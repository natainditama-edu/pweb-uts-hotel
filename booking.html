<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Simulasi Harga Booking</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4">
    <h3 class="text-center mb-4">Total Harga</h3>

    <!-- TIPE & HARGA OTOMATIS -->
    <div class="mb-3">
      <label class="form-label">Tipe Kamar</label>
      <input type="text" id="tipeKamar" class="form-control mb-2" readonly>

      <label class="form-label">Harga per Malam</label>
      <input type="text" id="hargaDisplay" class="form-control" readonly>

      <!-- hidden buat hitung -->
      <input type="hidden" id="harga">
    </div>

    <!-- JUMLAH MALAM -->
    <div class="mb-3">
      <label class="form-label">Jumlah Malam</label>
      <input type="number" id="malam" class="form-control" placeholder="Contoh: 2">
    </div>

    <!-- JUMLAH KAMAR -->
    <div class="mb-3">
      <label class="form-label">Jumlah Kamar</label>
      <input type="number" id="kamar" class="form-control" placeholder="Contoh: 1">
    </div>

    <!-- BUTTON HITUNG -->
    <button onclick="hitungTotal()" class="btn btn-primary w-100">
      Hitung Total
    </button>

    <!-- HASIL -->
    <div class="alert alert-success mt-4 text-center">
      Total Harga: <strong id="total">Rp 0</strong>
    </div>

    <!-- BUTTON RESERVASI -->
    <button id="btnReservasi" 
            class="btn btn-success w-100 mt-3" 
            style="display: none;"
            onclick="lanjutReservasi()">
      Reservasi Sekarang
    </button>

  </div>
</div>

<script>
// ambil data dari URL
const urlParams = new URLSearchParams(window.location.search);
const harga = parseInt(urlParams.get('harga'));
const tipe = urlParams.get('tipe');

// tampilkan otomatis
if (harga && tipe) {
  document.getElementById("tipeKamar").value = tipe;
  document.getElementById("harga").value = harga;
  document.getElementById("hargaDisplay").value = "Rp " + harga.toLocaleString();
}

// fungsi hitung
function hitungTotal() {
  let malam = document.getElementById("malam").value;
  let kamar = document.getElementById("kamar").value;
  let harga = document.getElementById("harga").value;

  if (malam === "" || kamar === "") {
    alert("Semua data harus diisi!");
    return;
  }

  let total = calculateTotalPrice(harga, malam, kamar);
  
// tombol reservasi
function lanjutReservasi() {
  const tipe = document.getElementById("tipeKamar").value;
  const total = document.getElementById("total").innerText;

  window.location.href = 
    `booking-form.html?tipe=${encodeURIComponent(tipe)}&total=${encodeURIComponent(total)}`;
}
</script>

</body>
</html>
