<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Form Reservasi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4">
    <h3 class="text-center mb-4">Form Reservasi</h3>

    <!-- DATA DARI HALAMAN SEBELUMNYA -->
    <div class="mb-3">
      <label class="form-label">Tipe Kamar</label>
      <input type="text" id="tipeKamar" class="form-control" readonly>
    </div>

    <div class="mb-3">
      <label class="form-label">Total Harga</label>
      <input type="text" id="totalHarga" class="form-control" readonly>
    </div>

    <!-- DATA USER -->
    <div class="mb-3">
      <label class="form-label">Nama</label>
      <input type="text" id="nama" class="form-control" placeholder="Masukkan nama">
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" id="email" class="form-control" placeholder="Masukkan email">
    </div>

    <div class="mb-3">
      <label class="form-label">No HP</label>
      <input type="text" id="hp" class="form-control" placeholder="Masukkan nomor HP">
    </div>

    <button onclick="prosesReservasi()" class="btn btn-success w-100">
      Konfirmasi Reservasi
    </button>

  </div>
</div>

<script>
// ambil data dari URL
const params = new URLSearchParams(window.location.search);
const tipe = params.get("tipe");
const total = params.get("total");

// tampilkan data
document.getElementById("tipeKamar").value = tipe || "-";
document.getElementById("totalHarga").value = total || "Rp 0";

// validasi + proses
function prosesReservasi() {
  let nama = document.getElementById("nama").value;
  let email = document.getElementById("email").value;
  let hp = document.getElementById("hp").value;

  if (!nama || !email || !hp) {
    alert("Semua data harus diisi!");
    return;
  }

  alert(
    "Reservasi Berhasil! 🎉\n\n" +
    "Nama: " + nama + "\n" +
    "Email: " + email + "\n" +
    "No HP: " + hp + "\n" +
    "Total: " + total
  );
}
</script>

</body>
</html>
